name: Audit Repros

on:
  push:
    branches:
      - ci/leo-audit-20260619
  workflow_dispatch:

concurrency:
  group: audit-repros-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Leo binary
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build leo
        run: cargo build -p leo-lang --locked --features noconfig
      - name: Stage binary
        run: |
          mkdir -p .ci-bin
          cp target/debug/leo .ci-bin/leo
      - name: Upload leo binary
        uses: actions/upload-artifact@v4
        with:
          name: leo-binary
          path: .ci-bin/leo
          if-no-files-found: error

  inclusive-loop-eq:
    name: "Repro: inclusive equal-bound loop"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: leo-binary
          path: .ci-bin
      - name: Run inclusive loop repro
        run: |
          chmod +x .ci-bin/leo
          LEO_BIN="$PWD/.ci-bin/leo" ARTIFACT_DIR="$PWD/inclusive_loop_eq_evidence" scripts/audit-repros/inclusive_loop_eq.sh | tee inclusive_loop_eq.txt
      - name: Add summary
        if: always()
        run: scripts/audit-repros/summary.sh inclusive_loop_eq.txt >> "$GITHUB_STEP_SUMMARY"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inclusive-loop-eq-result
          path: |
            inclusive_loop_eq.txt
            inclusive_loop_eq_evidence
          if-no-files-found: warn

  const-ternary-fallible:
    name: "Repro: constant ternary fallible arm"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: leo-binary
          path: .ci-bin
      - name: Run constant ternary repro
        run: |
          chmod +x .ci-bin/leo
          LEO_BIN="$PWD/.ci-bin/leo" ARTIFACT_DIR="$PWD/const_ternary_fallible_evidence" scripts/audit-repros/const_ternary_fallible.sh | tee const_ternary_fallible.txt
      - name: Add summary
        if: always()
        run: scripts/audit-repros/summary.sh const_ternary_fallible.txt >> "$GITHUB_STEP_SUMMARY"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: const-ternary-fallible-result
          path: |
            const_ternary_fallible.txt
            const_ternary_fallible_evidence
          if-no-files-found: warn

  dce-dynamic-array-index:
    name: "Repro: dynamic array index liveness"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: leo-binary
          path: .ci-bin
      - name: Run dynamic array index repro
        run: |
          chmod +x .ci-bin/leo
          LEO_BIN="$PWD/.ci-bin/leo" ARTIFACT_DIR="$PWD/dce_dynamic_array_index_evidence" scripts/audit-repros/dce_dynamic_array_index.sh | tee dce_dynamic_array_index.txt
      - name: Add summary
        if: always()
        run: scripts/audit-repros/summary.sh dce_dynamic_array_index.txt >> "$GITHUB_STEP_SUMMARY"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dce-dynamic-array-index-result
          path: |
            dce_dynamic_array_index.txt
            dce_dynamic_array_index_evidence
          if-no-files-found: warn

  option-else-if-unwrap:
    name: "Repro: option else-if unwrap placement"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: leo-binary
          path: .ci-bin
      - name: Run option else-if unwrap repro
        run: |
          chmod +x .ci-bin/leo
          LEO_BIN="$PWD/.ci-bin/leo" ARTIFACT_DIR="$PWD/option_else_if_unwrap_evidence" scripts/audit-repros/option_else_if_unwrap.sh | tee option_else_if_unwrap.txt
      - name: Add summary
        if: always()
        run: scripts/audit-repros/summary.sh option_else_if_unwrap.txt >> "$GITHUB_STEP_SUMMARY"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: option-else-if-unwrap-result
          path: |
            option_else_if_unwrap.txt
            option_else_if_unwrap_evidence
          if-no-files-found: warn
